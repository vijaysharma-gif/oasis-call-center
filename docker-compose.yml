services:

  backend:
    build:
      context: ./backend
    container_name: oasis-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    networks:
      - oasis

  frontend:
    build:
      context: ./frontend
    container_name: oasis-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - oasis

networks:
  oasis:
    driver: bridge
